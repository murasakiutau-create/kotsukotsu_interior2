  <!-- Firebase -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getAuth, GoogleAuthProvider, signInWithPopup, signOut, onAuthStateChanged }
      from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
    import { getFirestore, doc, getDoc, setDoc, collection, query, where, getDocs, orderBy, limit }
      from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    // ========================================
    // 🔧 ここにFirebaseの設定を貼り付けてください
    // ========================================
    const firebaseConfig = {
      apiKey: "AIzaSyD-IyMSjnmW8eWX-ddGbZZpBuxP7DeTgE8",
  authDomain: "oheyabiyori.firebaseapp.com",
  projectId: "oheyabiyori",
  storageBucket: "oheyabiyori.firebasestorage.app",
  messagingSenderId: "185723919457",
  appId: "1:185723919457:web:da6baa212b961ecc3b9e20"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const provider = new GoogleAuthProvider();

    let currentUser = null;

    // ========== AUTH ==========
    window.loginWithGoogle = async () => {
      try {
        await signInWithPopup(auth, provider);
      } catch(e) { console.error(e); alert('ログインに失敗しました'); }
    };
    window.logoutUser = async () => {
      if (!confirm('ログアウトしますか？')) return;
      // ログアウト前に部屋データをクリア
      window.appState.placedItems = [];
      window.appState.inventory = [];
      window.appState.todos = [];
      window.appState.coins = 0;
      await signOut(auth);
    };

    onAuthStateChanged(auth, async (user) => {
      currentUser = user;
      if (user) {
        // 前のユーザーデータをリセット
        window.appState.coins = 0;
        window.appState.todos = [];
        window.appState.inventory = [];
        window.appState.placedItems = [];
        window.appState.history = [];
        window.appState.totalEarned = 0;
        window.appState.dailyEarned = 0;
        window.appState.dailyEarnedDate = '';
        // 部屋をリセット
        if (typeof placedItems !== 'undefined') {
          placedItems.forEach(i => { try { i.el.remove(); } catch(e){} });
          placedItems = [];
          roomInited = false;
        }
        document.getElementById('login-screen').style.display = 'none';
        document.getElementById('app').style.display = 'flex';
        document.getElementById('user-avatar').src = user.photoURL || '';
        document.getElementById('user-name-display').textContent = user.displayName || user.email;
        await loadUserData(user.uid);
        renderAll();
      } else {
        document.getElementById('login-screen').style.display = 'flex';
        document.getElementById('app').style.display = 'none';
      }
    });

    // ========== DATA ==========
    async function loadUserData(uid) {
      const snap = await getDoc(doc(db, 'users', uid));
      if (snap.exists()) {
        const d = snap.data();
        // 別ユーザーのデータが残らないようにリセット
        window.appState.coins = d.coins ?? 100;
        window.appState.todos = d.todos ?? [];
        window.appState.inventory = d.inventory ?? [];
        window.appState.placedItems = d.placedItems ?? [];
        window.appState.roomPublic = d.roomPublic ?? false;
        window.appState.roomName = d.roomName ?? (currentUser.displayName + 'の部屋');
        window.appState.history = d.history ?? [];
        window.appState.totalEarned = d.totalEarned ?? 0;
        window.appState.dailyEarned = d.dailyEarned ?? 0;
        window.appState.dailyEarnedDate = d.dailyEarnedDate ?? '';
      } else {
        // 新規ユーザー
        window.appState.coins = 200;
        window.appState.todos = [];
        window.appState.inventory = [];
        window.appState.placedItems = [];
        window.appState.roomPublic = false;
        window.appState.roomName = (currentUser.displayName || 'ゲスト') + 'の部屋';
        await saveUserData();
      }
    }

    window.saveUserData = async () => {
      if (!currentUser) return;
      await setDoc(doc(db, 'users', currentUser.uid), {
        coins: window.appState.coins,
        todos: window.appState.todos,
        inventory: window.appState.inventory,
        placedItems: window.appState.placedItems,
        roomPublic: window.appState.roomPublic,
        roomName: window.appState.roomName,
        history: window.appState.history || [],
        totalEarned: window.appState.totalEarned || 0,
        dailyEarned: window.appState.dailyEarned || 0,
        dailyEarnedDate: window.appState.dailyEarnedDate || '',
        displayName: currentUser.displayName,
        photoURL: currentUser.photoURL,
        updatedAt: Date.now()
      });
    };

    // 公開部屋をpublic_roomsコレクションに保存
    window.savePublicRoom = async () => {
      if (!currentUser) return;
      if (!window.appState.roomPublic) {
        // 非公開にしたらpublic_roomsから削除
        try {
          const { deleteDoc } = await import("https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js");
          await deleteDoc(doc(db, 'public_rooms', currentUser.uid));
        } catch(e) {}
        return;
      }
      await setDoc(doc(db, 'public_rooms', currentUser.uid), {
        userId: currentUser.uid,
        displayName: currentUser.displayName,
        photoURL: currentUser.photoURL || '',
        roomName: window.appState.roomName,
        placedItems: window.appState.placedItems,
        updatedAt: Date.now()
      });
    };

    window.loadPublicRooms = async () => {
      const q = query(
        collection(db, 'public_rooms'),
        limit(20)
      );
      const snap = await getDocs(q);
      return snap.docs
        .filter(d => d.id !== currentUser?.uid)
        .map(d => ({ uid: d.id, ...d.data() }));
    };

    window.getCurrentUser = () => currentUser;
  </script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --cream: #f5f4f0;
      --warm: #edeae2;
      --brown: #333;
      --dark-brown: #111;
      --gold: #444;
      --gold-light: #666;
      --green: #555;
      --red: #333;
      --blue: #444;
      --purple: #444;
      --shadow: rgba(0,0,0,0.12);
      --border: #ccc;
      --surface: #fff;
      --accent: #1a1a1a;
    }
    html, body {
      width:100%; height:100%; overflow:hidden;
      background: #888;
      font-family: 'KH-Dot-Hibiya', 'Hiragino Mincho ProN', 'Yu Mincho', serif;
      touch-action: none;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }
    /* PCでスマホ風レイアウトに固定 */
    #app, #login-screen {
      max-width: 480px;
      margin: 0 auto;
      position: relative;
    }
    #login-screen {
      left: 50%;
      transform: translateX(-50%);
      width: 100%;
    }

    /* ========== LOGIN SCREEN ========== */
    #login-screen {
      position:fixed; inset:0; display:flex; flex-direction:column;
      align-items:center; justify-content:center;
      background: var(--cream);
      z-index:9999;
    }
    #login-screen .login-house { font-size:4rem; margin-bottom:1.2rem; letter-spacing:-.02em; color:#1a1a1a; }
    @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-8px)} }
    #login-screen h1 { font-size:1.6rem; color:#1a1a1a; letter-spacing:.15em; margin-bottom:.4rem; }
    #login-screen p { font-size:.82rem; color:#666; margin-bottom:2.5rem; letter-spacing:.06em; }
    #google-login-btn {
      display:flex; align-items:center; gap:.7rem;
      background:#1a1a1a; color:#f5f4f0; border:none; border-radius:4px;
      padding:.9rem 2rem; font-size:.9rem; letter-spacing:.08em;
      box-shadow:0 2px 8px rgba(0,0,0,.15); cursor:pointer; font-family:inherit;
      transition:transform .15s, box-shadow .15s;
    }
    #google-login-btn:active { transform:translateY(3px); box-shadow:0 1px 4px rgba(0,0,0,.2); }
    #google-login-btn img { width:22px; height:22px; }

    /* ========== APP SHELL ========== */
    #app {
      display:none; flex-direction:column; width:100%; height:100%;
    }

    /* ========== HEADER ========== */
    #header {
      background: #1a1a1a;
      color:#f5f4f0; padding:.5rem .8rem; flex-shrink:0;
      display:flex; align-items:center; gap:.6rem;
      box-shadow:0 2px 6px rgba(0,0,0,.2); position:relative; z-index:100;
      border-bottom:1px solid #333;
    }
    #header .coin-display {
      display:flex; align-items:center; gap:.3rem;
      background:rgba(255,255,255,.12); border-radius:20px;
      padding:.2rem .7rem; font-size:.95rem; font-weight:bold;
    }
    #header .spacer { flex:1; }
    #header .user-info {
      display:flex; align-items:center; gap:.4rem;
    }
    #user-avatar { width:28px; height:28px; border-radius:50%; border:2px solid rgba(255,255,255,.5); }
    #user-name-display { font-size:.75rem; max-width:80px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
    #logout-btn {
      background:rgba(255,255,255,.1); border:1px solid rgba(255,255,255,.2);
      color:#f5f4f0; border-radius:4px; padding:.2rem .6rem; font-size:.7rem;
      cursor:pointer; letter-spacing:.05em;
    }

    /* ========== BOTTOM NAV ========== */
    #bottom-nav {
      flex-shrink:0; display:flex; background:#fff; border-top:1px solid #e8ddd0;
      box-shadow:0 -2px 8px rgba(0,0,0,.08);
    }
    .nav-btn {
      flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center;
      padding:.5rem .2rem; gap:.2rem; border:none; background:transparent;
      cursor:pointer; font-size:.65rem; color:#999; transition:color .2s;
    }
    .nav-btn .icon { font-size:1.4rem; }
    .nav-btn.active { color:#1a1a1a; }
    .nav-btn.active .icon { transform:scale(1.1); font-size:1.5rem; }

    /* ========== SCREENS ========== */
    #main-content { flex:1; overflow:hidden; position:relative; }
    .screen { position:absolute; inset:0; overflow-y:auto; display:none; background:var(--cream); z-index:1; }
    .screen.active { display:block; z-index:2; }
    #room-screen { background:#f0e8d8; }
    #room-screen.room-active { display:flex !important; flex-direction:column; overflow:hidden; }

    /* ========== TODO SCREEN ========== */
    #todo-screen { background:var(--cream); }
    .screen-header {
      background:var(--surface); padding:.8rem 1rem; border-bottom:1px solid var(--border);
      display:flex; align-items:center; justify-content:space-between;
      border-bottom:1px solid #e0d0b8; position:sticky; top:0; z-index:10;
    }
    .screen-header h2 { font-size:1rem; color:var(--dark-brown); }
    .add-btn {
      background:#1a1a1a; color:#fff; border:none; border-radius:4px;
      width:32px; height:32px; font-size:1.2rem; cursor:pointer;
      display:flex; align-items:center; justify-content:center;
    }

    .todo-list { padding:.8rem; display:flex; flex-direction:column; gap:.6rem; }

    .todo-card {
      background:#fff; border-radius:14px;
      box-shadow:0 2px 8px var(--shadow);
      overflow:hidden;
    }
    .todo-card-header {
      display:flex; align-items:center; padding:.7rem .9rem; gap:.7rem;
    }
    .todo-title { flex:1; font-size:.88rem; letter-spacing:.04em; color:#111; }
    .todo-reward { font-size:.78rem; color:#555; }
    .todo-delete-btn { background:none; border:none; color:#ccc; font-size:1rem; cursor:pointer; padding:.2rem; }

    .todo-achieve-bar {
      display:flex; border-top:1px solid #f0e8d8; overflow:hidden;
    }
    .achieve-btn {
      flex:1; padding:.55rem .3rem; border:none; cursor:pointer;
      font-size:.72rem; font-weight:bold; text-align:center;
      transition:filter .15s;
    }
    .achieve-btn:active { filter:brightness(.9); }
    .achieve-btn.little { background:#f5f5f5; color:#555; }
    .achieve-btn.mostly { background:#ebebeb; color:#333; }
    .achieve-btn.full   { background:#1a1a1a; color:#fff; }
    .achieve-btn .pct   { font-size:.65rem; opacity:.8; display:block; }

    .todo-card.done .todo-title { text-decoration:line-through; color:#bbb; }
    .todo-card.done .achieve-btn { opacity:.4; pointer-events:none; }

    .empty-state {
      text-align:center; padding:3rem 1rem; color:#bbb;
    }
    .empty-state .emoji { font-size:3rem; display:block; margin-bottom:.8rem; }

    /* ========== ADD TODO MODAL ========== */
    .modal-overlay {
      position:fixed; inset:0; background:rgba(0,0,0,.4); z-index:500;
      display:none; align-items:center; justify-content:center;
    }
    .modal-overlay.show { display:flex; }
    .modal-box {
      background:#fff; border-radius:20px; padding:1.4rem;
      width:min(90vw,380px); box-shadow:0 10px 40px rgba(0,0,0,.3);
    }
    .modal-box h3 { font-size:1rem; color:var(--dark-brown); margin-bottom:1rem; }
    .modal-field { margin-bottom:.9rem; }
    .modal-field label { display:block; font-size:.78rem; color:var(--brown); margin-bottom:.3rem; }
    .modal-field input, .modal-field textarea {
      width:100%; border:1.5px solid #e0d0b8; border-radius:10px;
      padding:.55rem .8rem; font-size:.9rem; outline:none;
      font-family:inherit; background:#fdf6ec;
    }
    .modal-field input:focus, .modal-field textarea:focus { border-color:var(--gold); }
    .modal-field .reward-hint { font-size:.7rem; color:#aaa; margin-top:.2rem; }
    .modal-btns { display:flex; gap:.7rem; margin-top:1rem; }
    .modal-btn-cancel {
      flex:1; padding:.7rem; border:1px solid #ccc; border-radius:4px;
      background:#fff; color:#666; font-size:.88rem; cursor:pointer; font-family:inherit; letter-spacing:.04em;
    }
    .modal-btn-ok {
      flex:2; padding:.7rem; border:none; border-radius:4px;
      background:#1a1a1a; color:#fff; font-size:.88rem; letter-spacing:.06em; cursor:pointer; font-family:inherit;
    }

    /* ========== SHOP SCREEN ========== */
    #shop-screen { background:var(--cream); }
    .shop-tabs {
      display:flex; overflow-x:auto; padding:.5rem .8rem; gap:.5rem;
      background:var(--warm); border-bottom:1px solid #e0d0b8;
      position:sticky; top:0; z-index:10;
    }
    .shop-tab {
      flex-shrink:0; padding:.35rem .9rem; border-radius:20px;
      border:1.5px solid #ddd; background:#fff; font-size:.78rem;
      cursor:pointer; color:#888; transition:all .2s; white-space:nowrap;
    }
    .shop-tab.active { background:#1a1a1a; border-color:#1a1a1a; color:#fff; }

    .shop-grid {
      display:grid; grid-template-columns:repeat(3,1fr); gap:.7rem; padding:.8rem;
    }
    .shop-item {
      background:#fff; border-radius:12px; padding:.6rem;
      box-shadow:0 2px 6px var(--shadow); cursor:pointer;
      transition:transform .15s, box-shadow .15s;
      display:flex; flex-direction:column; align-items:center; gap:.4rem;
    }
    .shop-item:active { transform:scale(.96); }
    .shop-item img { width:60px; height:60px; object-fit:contain; }
    .shop-item .item-name { font-size:.65rem; color:#444; text-align:center; line-height:1.3; letter-spacing:.02em; }
    .shop-item .item-price {
      font-size:.75rem; color:#444;
      background:#f0f0f0; border-radius:3px; padding:.15rem .5rem; letter-spacing:.04em;
    }
    .shop-item.owned { opacity:.5; pointer-events:none; }
    .shop-item.owned .item-price { background:#eee; color:#aaa; }

    /* ========== GACHA SCREEN ========== */
    #gacha-screen { background:linear-gradient(160deg,#1a0a2e 0%,#2d1b4e 50%,#1a0a2e 100%); }
    .gacha-inner { padding:1rem; }
    .gacha-title { text-align:center; color:#e8c840; font-size:1.2rem; font-weight:bold; padding:.8rem 0; text-shadow:0 0 20px rgba(232,200,64,.5); }
    .gacha-machine {
      background:linear-gradient(180deg,#2a1040,#4a1a80,#2a1040);
      border:3px solid #8a50e0; border-radius:20px;
      margin:.5rem auto; padding:1rem;
      max-width:320px; text-align:center;
      box-shadow:0 0 30px rgba(138,80,224,.4);
    }
    .gacha-sphere {
      width:120px; height:120px; margin:0 auto .8rem;
      background:radial-gradient(circle at 35% 35%,#fff,#c8a0ff 40%,#6020c0);
      border-radius:50%; box-shadow:0 0 30px rgba(192,96,255,.6), inset 0 -10px 20px rgba(0,0,0,.3);

      display:flex; align-items:center; justify-content:center; font-size:3rem;
    }
    @keyframes gachaSpin { 0%{transform:rotate(0deg)} 100%{transform:rotate(360deg)} }
    .gacha-sphere.spinning { animation:gachaShake .1s infinite; }
    @keyframes gachaShake {
      0%{transform:translateX(-4px) rotate(-5deg)}
      50%{transform:translateX(4px) rotate(5deg)}
      100%{transform:translateX(-4px) rotate(-5deg)}
    }
    .gacha-cost {
      color:#e8c840; font-size:1rem; font-weight:bold; margin-bottom:.8rem;
    }
    .gacha-cost small { font-size:.7rem; color:#aaa; display:block; margin-top:.2rem; }
    .gacha-pull-btn {
      background:linear-gradient(180deg,#f0d060,#c08010);

      padding:.8rem 2.5rem; font-size:1rem; font-weight:bold;
      box-shadow:0 4px 0 #6a4000, 0 6px 16px rgba(0,0,0,.4);
      cursor:pointer; transition:transform .1s, box-shadow .1s;

    .gacha-pull-btn:active { transform:translateY(3px); box-shadow:0 1px 0 #6a4000; }

      background:rgba(255,255,255,.1); border-radius:16px;
      padding:1rem; margin-top:1rem; text-align:center;

    .gacha-result.show { display:block; animation:fadeInUp .4s ease; }
    @keyframes fadeInUp { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }
    .gacha-result img { width:80px; height:80px; object-fit:contain; margin-bottom:.5rem; }
    .gacha-result .result-name { color:#fff; font-size:.9rem; font-weight:bold; }
    .gacha-result .result-status { font-size:.75rem; margin-top:.3rem; }
    .gacha-result .result-status.new { color:#f0d060; }
    .gacha-result .result-status.dup { color:#aaa; }
    .gacha-history { padding:0 1rem 1rem; }
    .gacha-history h4 { color:#c8a0ff; font-size:.8rem; margin-bottom:.5rem; }
    .gacha-log {
      display:flex; flex-wrap:wrap; gap:.4rem;
    }
    .gacha-log-item {
      background:rgba(255,255,255,.08); border-radius:8px;
      padding:.3rem .5rem; font-size:.65rem; color:#ccc;
    }
    .gacha-log-item.new { color:#f0d060; }

    /* ========== ROOM SCREEN ========== */
    #room-screen { background:#f0e8d8; display:flex; flex-direction:column; overflow:hidden; }
    .room-toolbar {
      background:var(--surface); border-bottom:1px solid var(--border); padding:.4rem .6rem;
      display:flex; align-items:center; gap:.5rem; flex-shrink:0;
      border-bottom:1px solid #e0d0b8; overflow-x:auto;
    }
    .room-toolbar::-webkit-scrollbar { display:none; }
    .room-cat-btn {
      flex-shrink:0; padding:.3rem .7rem; border-radius:20px;
      border:1.5px solid #ddd; background:#fff; font-size:.72rem;
      cursor:pointer; color:#888; white-space:nowrap;
    }
    .room-cat-btn.active { background:#1a1a1a; border-color:#1a1a1a; color:#fff; }
    .room-wrapper {
      flex:1; position:relative; overflow:hidden;
      background:#c8b49a;
    }
    #room-bg {
      position:absolute; top:50%; left:50%;
      transform:translate(-50%,-50%);
      pointer-events:none; image-rendering:pixelated;
    }
    .placed-item {
      position:absolute; cursor:grab; touch-action:none;
      transform-origin:center center;
    }
    .placed-item.small-item {
      min-width:52px !important; min-height:52px !important;
    }
    .placed-item.small-item img {
      position:absolute; top:50%; left:50%;
      transform:translate(-50%,-50%) !important;
      width:auto !important; height:auto !important;
      max-width:80%; max-height:80%;
    }
    .placed-item.selected { outline:2px solid #1a1a1a; outline-offset:3px; }
    .placed-item.dragging { cursor:grabbing; opacity:.85; }
    .delete-btn, .flip-btn {
      position:absolute; background:rgba(0,0,0,.6); color:#fff;
      border:none; border-radius:50%; cursor:pointer;
      display:none; font-size:.75rem;
      width:22px; height:22px;
      display:none; align-items:center; justify-content:center;
    }
    .placed-item.selected .delete-btn { display:flex; top:-10px; right:-10px; }
    .placed-item.selected .flip-btn { display:flex; top:-10px; left:-10px; }

    .room-cat-modal-overlay {
      position:absolute; inset:0; background:rgba(0,0,0,.35); z-index:2000; display:none;
    }
    .room-cat-modal-overlay.show { display:block; }
    .room-furniture-item {
      background:var(--cream); border-radius:10px; padding:.5rem;
      display:flex; flex-direction:column; align-items:center; gap:.3rem;
      cursor:pointer; border:1.5px solid transparent;
    }
    .room-furniture-item:active { border-color:var(--gold); }
    .room-furniture-item img { width:48px; height:48px; object-fit:contain; }
    .room-furniture-item span { font-size:.58rem; color:var(--brown); text-align:center; line-height:1.2; }
    .room-furniture-item.locked { opacity:.35; pointer-events:none; }
    .room-furniture-item.locked img { filter:grayscale(1); }

    .room-actions {
      position:absolute; bottom:.6rem; right:.6rem; display:flex; flex-direction:column; gap:.5rem;
    }
    .room-action-btn {
      background:rgba(255,255,255,.88); border:1px solid #ccc;
      border-radius:4px; padding:.45rem .7rem; font-size:.7rem; letter-spacing:.04em;
      cursor:pointer; box-shadow:0 1px 4px rgba(0,0,0,.1); white-space:nowrap; font-family:inherit;
    }

    /* ========== ROOMS SCREEN ========== */
    #rooms-screen { background:var(--cream); }
    .rooms-list { padding:.8rem; display:flex; flex-direction:column; gap:.6rem; }
    .room-card {
      background:#fff; border-radius:14px; overflow:hidden;
      box-shadow:0 2px 8px var(--shadow); cursor:pointer;
      transition:transform .15s; position:relative;
    }
    .room-card:active { transform:scale(.98); }
    .room-card-info { padding:.8rem 1rem; display:flex; align-items:center; gap:.7rem; position:relative; z-index:10; }
    .room-card-info img { width:36px; height:36px; border-radius:50%; border:2px solid var(--warm); flex-shrink:0; }
    .room-card-info .room-card-name { font-size:.9rem; font-weight:bold; color:var(--dark-brown); }
    .room-card-info .room-card-user { font-size:.72rem; color:#999; }
    .room-card-info .room-card-arrow { margin-left:auto; color:#ccc; font-size:1rem; }

    /* 部屋ビューアー */
    .viewer-temp { pointer-events:none !important; }
    #room-viewer-header-bar { display:none; position:fixed; top:0; left:0; right:0; z-index:6000; flex-direction:column; }
    #room-viewer-header-bar.show { display:flex !important; }

    /* ========== TOAST ========== */
    #toast {
      position:fixed; bottom:calc(56px + 1rem); left:50%;
      transform:translateX(-50%) translateY(20px);
      background:rgba(20,20,20,.9); color:#f5f4f0;
      padding:.55rem 1.2rem; border-radius:30px; font-size:.82rem;
      pointer-events:none; opacity:0; transition:opacity .25s, transform .25s;
      white-space:nowrap; z-index:9000; max-width:85vw;
    }
    #toast.show { opacity:1; transform:translateX(-50%) translateY(0); }

    /* ========== COIN REWARD POPUP ========== */
    #coin-popup {
      position:fixed; top:50%; left:50%;
      transform:translate(-50%,-50%) scale(.8);
      background:#fff; border-radius:20px; padding:1.5rem 2rem;
      text-align:center; box-shadow:0 10px 40px rgba(0,0,0,.3);
      z-index:8000; display:none; opacity:0;
      transition:opacity .3s, transform .3s;
    }
    #coin-popup.show { display:block; opacity:1; transform:translate(-50%,-50%) scale(1); }
    #coin-popup .coin-emoji { font-size:3rem; display:block; }
    #coin-popup .coin-amount { font-size:1.8rem; color:#1a1a1a; }
    #coin-popup .coin-msg { font-size:.82rem; color:#555; margin-top:.3rem; letter-spacing:.04em; }

    /* ========== SETTINGS / ROOM SETTINGS ========== */

      background:rgba(255,255,255,.9); border:1.5px solid #ddd;

      display:flex; align-items:center; justify-content:space-between;

    .toggle {
      position:relative; width:44px; height:24px;

    .toggle input { opacity:0; width:0; height:0; }
    .toggle-slider {
      position:absolute; inset:0; background:#ccc; border-radius:12px;
      cursor:pointer; transition:background .2s;
    }
    .toggle-slider:before {
      content:''; position:absolute;
      width:18px; height:18px; background:#fff;
      border-radius:50%; top:3px; left:3px;
      transition:transform .2s;
      box-shadow:0 1px 3px rgba(0,0,0,.3);

    input:checked + .toggle-slider { background:var(--green); }

    /* ===== FURNITURE GROUP ===== */

      font-size:.75rem; letter-spacing:.08em; color:#555;

    .furniture-group-grid {
      display:grid; grid-template-columns:repeat(3,1fr); gap:.6rem; margin-bottom:.4rem;
    }

    /* ===== ROOM CAT MODAL SCROLL FIX ===== */
    .room-cat-modal {
      position:absolute; bottom:0; left:0; right:0;
      background:#fff; border-radius:16px 16px 0 0;
      max-height:65%; display:none; flex-direction:column;
      z-index:2001;
    }
    .room-cat-modal.open { display:flex; }
    .room-cat-modal-header {
      flex-shrink:0; padding:.6rem .8rem;
      display:flex; align-items:center; justify-content:space-between;
      border-bottom:1px solid #f0e8d8;
    }
    .room-cat-modal-title { font-size:.9rem; font-weight:bold; color:var(--dark-brown); }
    .room-cat-modal-close {
      background:none; border:none; font-size:1.2rem; cursor:pointer; color:#aaa; padding:.2rem .5rem;
    }
    .room-cat-filter-bar {
      display:flex; gap:.4rem; padding:.4rem .8rem; flex-shrink:0;
      border-bottom:1px solid #f0e8d8;
    }
    .room-cat-filter-btn {
      flex:1; padding:.3rem .4rem; border-radius:16px;

      cursor:pointer; color:#888; text-align:center;
    }

    .room-cat-modal-body {

</head>

  const d = new Date();

}

    card.innerHTML = `
      <div class="todo-card-header">
        <span class="todo-title">${escHtml(todo.title)}</span>

        </button>
        <button class="achieve-btn mostly" data-i="${i}" data-pct="70">
          まぁまぁ<span class="pct">🪙${pctMostly}</span>
        </button>
        <button class="achieve-btn full" data-i="${i}" data-pct="100">
          できた！<span class="pct">🪙${pctFull}</span>
        </button>

    list.appendChild(card);
  });

  list.querySelectorAll('.achieve-btn').forEach(btn => {

      const i = parseInt(btn.dataset.i);
      const pct = parseInt(btn.dataset.pct);
      achieveTodo(i, pct);
    });
  });
  list.querySelectorAll('.todo-delete-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const i = parseInt(btn.dataset.i);

function achieveTodo(index, pct) {
  const todo = appState.todos[index];
  if (!todo || todo.done) return;
  checkDailyReset();
  const remaining = getDailyRemaining();
  if (remaining <= 0) {
    showToast('🚫 今日の上限（270G）に達しました。明日またチャレンジ！');
    return;
  }
  const rawEarned = Math.round(todo.reward * pct / 100);
  const earned = Math.min(rawEarned, remaining); // 上限を超えないように
  appState.coins += earned;
  appState.dailyEarned += earned;
  if (!appState.totalEarned) appState.totalEarned = 0;
  appState.totalEarned += earned;
  todo.done = true;
  const labels = { 35: '少しできた', 70: 'まぁまぁできた', 100: 'できた！' };
  if (!appState.history) appState.history = [];
  appState.history.unshift({ title: todo.title, earned, level: labels[pct], date: Date.now() });
  if (appState.history.length > 50) appState.history = appState.history.slice(0, 50);
  const newRemaining = getDailyRemaining();
  const msg = newRemaining <= 0 ? labels[pct] + '！（本日の上限に達しました）' : labels[pct] + `！（今日残り${newRemaining}G）`;
  showCoinPopup(earned, msg);
  saveUserData().then(() => {
    updateCoinDisplay();
    renderTodos();
  });
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// グループ名抽出：名前の「（カラー）」部分を除いたベース名
function getBaseName(name) {
  return name.replace(/（[^）]*）$/, '').replace(/\s*\([^)]*\)$/, '').trim();
}

function renderShopGrid() {
  const cat = shopCategory;
  const grid = document.getElementById('shop-grid');
  grid.innerHTML = '';
  let items = FURNITURE.filter(f => f.category === cat);

  // フィルター適用
  if (shopFilter === 'owned') items = items.filter(f => appState.inventory?.includes(f.id));
  else if (shopFilter === 'notowned') items = items.filter(f => !appState.inventory?.includes(f.id));

  if (items.length === 0) {
    grid.innerHTML = '<div style="padding:2rem;text-align:center;color:#bbb;grid-column:1/-1;">該当する家具がありません</div>';
    return;
  }

  // ベース名でグループ化
  const groups = {};
  items.forEach(f => {
    const base = getBaseName(f.name);
    if (!groups[base]) groups[base] = [];
    groups[base].push(f);
  });

  // グループごとに描画（grid全体をラップ）
  grid.style.display = 'block';
  Object.entries(groups).forEach(([groupName, groupItems]) => {
    const section = document.createElement('div');
    section.className = 'furniture-group';
    // グループが複数アイテムある場合のみタイトル表示
    if (Object.keys(groups).length > 1 || groupItems.length > 1) {
      const title = document.createElement('div');
      title.className = 'furniture-group-title';
      title.textContent = groupName;
      section.appendChild(title);
    }
    const innerGrid = document.createElement('div');
    innerGrid.className = 'furniture-group-grid';
    groupItems.forEach(f => {
      const price = getItemPrice(f);
      const owned = appState.inventory?.includes(f.id);
      const div = document.createElement('div');
      div.className = 'shop-item' + (owned ? ' owned' : '');
      // バリエーション名のみ表示（ベース名を除く）
      const variant = f.name.replace(groupName, '').replace(/^[　\s]+/, '').trim() || f.name;
      div.innerHTML = `
        <img src="${'images/' + f.file}" alt="${f.name}" loading="lazy" />
        <div class="item-name">${variant || f.name}</div>
        <div class="item-price">${owned ? '✔ 所持済み' : '🪙' + price}</div>`;
      if (!owned) div.addEventListener('click', () => showPurchaseModal(f));
      innerGrid.appendChild(div);
    });
    section.appendChild(innerGrid);
    grid.appendChild(section);
  });
}

// ========== SHADOW SETTINGS ==========
const SHADOW_SETTINGS = { alpha: 0.44, blur: 7, hRatio: 0.60, wScale: 0.78 };

function measureFootprint(img) {
  try {
    const c = document.createElement('canvas');
    const w = img.naturalWidth, h = img.naturalHeight;
    if (!w || !h) return { cx: 0.5, width: 0.7 };
    c.width = w; c.height = h;
    const ctx = c.getContext('2d');
    ctx.drawImage(img, 0, 0);
    const data = ctx.getImageData(0, 0, w, h).data;
    const A = 16;
    let rows = [];
    for (let y = h - 1; y >= 0 && rows.length < Math.max(3, h * 0.08); y--) {
      let minX = -1, maxX = -1;
      for (let x = 0; x < w; x++) {
        if (data[(y * w + x) * 4 + 3] > A) { if (minX < 0) minX = x; maxX = x; }
      }
      if (minX >= 0) rows.push([minX, maxX]);
    }
    if (!rows.length) return { cx: 0.5, width: 0.6 };
    let sMin = 0, sMax = 0;
    rows.forEach(r => { sMin += r[0]; sMax += r[1]; });
    sMin /= rows.length; sMax /= rows.length;
    return { cx: (sMin + sMax) / 2 / w, width: (sMax - sMin) / w };
  } catch(e) { return { cx: 0.5, width: 0.6 }; }
}

function makeShadow(foot, displayW) {
  const s = SHADOW_SETTINGS;
  const ellW = displayW * Math.min(1, foot.width * 1.25 + 0.12) * s.wScale;
  const ellH = ellW * s.hRatio;
  const pad = s.blur * 2 + 4;
  const svgW = ellW + pad * 2, svgH = ellH + pad * 2;
  const ns = 'http://www.w3.org/2000/svg';
  const svg = document.createElementNS(ns, 'svg');
  svg.setAttribute('width', svgW); svg.setAttribute('height', svgH);
  svg.style.filter = `blur(${s.blur}px)`;
  const el = document.createElementNS(ns, 'ellipse');
  el.setAttribute('cx', svgW / 2); el.setAttribute('cy', svgH / 2);
  el.setAttribute('rx', ellW / 2); el.setAttribute('ry', ellH / 2);
  el.setAttribute('fill', `rgba(40,28,15,${s.alpha})`);
  svg.appendChild(el);
  return { svg, cxOffset: (foot.cx - 0.5) * displayW };
}

function attachShadow(el, img) {
  const shadowHolder = document.createElement('div');
  shadowHolder.className = 'shadow-holder';
  shadowHolder.style.cssText = 'position:absolute;bottom:0;left:50%;transform:translateX(-50%);pointer-events:none;z-index:-1;';
  el.insertBefore(shadowHolder, el.firstChild);
  
  function renderShadow() {
    shadowHolder.innerHTML = '';
    const dispW = parseInt(el.style.width) || el.clientWidth;
    if (!dispW) return;
    const foot = measureFootprint(img);
    const s = makeShadow(foot, dispW);
    shadowHolder.style.left = `calc(50% + ${s.cxOffset}px)`;
    shadowHolder.appendChild(s.svg);
  }
  
  if (img.complete && img.naturalWidth) {
    renderShadow();
  } else {
    img.addEventListener('load', renderShadow, { once: true });
  }
}

function createPlacedItem(f, cx, cy, savedData) {
  itemCounter++;
  const id = savedData?.id || ('item_' + itemCounter);
  const el = document.createElement('div');
  el.className = 'placed-item';
  el.id = id;
  el.dataset.fid = f.id;

  // v12オリジナルと同じ：baseSize=1024のみ、roomScaleは使わない
  const baseSize = 1024;
  const w = Math.round(baseSize * (savedData?.sx || f.scaleX));
  const h = Math.round(baseSize * (savedData?.sy || f.scaleY));
  const posX = savedData?.x ?? cx;
  const posY = savedData?.y ?? cy;

  el.style.width   = w + 'px';
  el.style.height  = h + 'px';
  el.style.left    = (posX - w / 2) + 'px';
  el.style.top     = (posY - h / 2) + 'px';
  el.style.zIndex  = String(f.zBase + Math.floor(posY));

  const img = document.createElement('img');
  // 新家具はBase64、旧家具はファイルパス
  img.src = 'images/' + f.file;
  img.alt = f.name;
  img.draggable = false;
  img.style.width = '100%';
  img.style.height = '100%';
  img.style.objectFit = 'contain';
  img.style.display = 'block';
  // savedDataがある場合はそのrotation、新規配置はdefaultRotationを使う
  const initRot = savedData ? (savedData.rotation || 0) : (f.defaultRotation || 0);
  const initFlip = savedData?.flipped || false;
  if (initFlip || initRot) {
    img.style.transform = initFlip
      ? (initRot ? `scaleX(-1) rotate(${initRot}deg)` : 'scaleX(-1)')
      : `rotate(${initRot}deg)`;
  }

  const delBtn = document.createElement('div');
  delBtn.className = 'delete-btn';
  delBtn.textContent = '×';
  delBtn.addEventListener('pointerdown', e => e.stopPropagation());
  delBtn.addEventListener('click', e => {
    e.stopPropagation();
    el.remove();
    placedItems = placedItems.filter(i => i.id !== id);
    selectedEl = null;
    showToast('削除しました');
  });

  const flipBtn = document.createElement('div');
  flipBtn.className = 'flip-btn';
  flipBtn.textContent = '⇄';
  flipBtn.addEventListener('pointerdown', e => e.stopPropagation());
  flipBtn.addEventListener('click', e => {
    e.stopPropagation();
    const item = placedItems.find(i => i.id === id);
    if (!item) return;
    item.flipped = !item.flipped;
    img.style.transform = item.flipped ? 'scaleX(-1)' : '';
  });

  el.appendChild(img);
  el.appendChild(delBtn);
  el.appendChild(flipBtn);
  // 影をアタッチ
  attachShadow(el, img);
  document.getElementById('room-wrapper').appendChild(el);
  placedItems.push({ id, f, el, flipped: savedData?.flipped || false });
  setupDrag(el, f);
  return el;
}

function setupDrag(el, f) {
  let isDragging = false, startX, startY, origLeft, origTop, pointerId, moved = false;
  el.addEventListener('pointerdown', e => {
    if (e.target.classList.contains('delete-btn') || e.target.classList.contains('flip-btn')) return;
    e.stopPropagation(); e.preventDefault();
    pointerId = e.pointerId;
    el.setPointerCapture(e.pointerId);
    startX = e.clientX; startY = e.clientY;
    origLeft = parseInt(el.style.left) || 0;
    origTop  = parseInt(el.style.top)  || 0;
    isDragging = false; moved = false;
  });
  el.addEventListener('pointermove', e => {
    if (e.pointerId !== pointerId) return;
    const dx = e.clientX - startX, dy = e.clientY - startY;
    if (!isDragging && (Math.abs(dx) > 4 || Math.abs(dy) > 4)) {
      isDragging = true; moved = true;
      el.classList.add('dragging');
      select(el);
    }
    if (isDragging) {
      const rect = document.getElementById('room-wrapper').getBoundingClientRect();
      const w = parseInt(el.style.width), h = parseInt(el.style.height);
      let newLeft = Math.max(-w*.35, Math.min(rect.width-w*.65, origLeft+dx));
      let newTop  = Math.max(-h*.35, Math.min(rect.height-h*.35, origTop+dy));
      el.style.left   = newLeft + 'px';
      el.style.top    = newTop  + 'px';
      el.style.zIndex = String(f.zBase + Math.floor(newTop + h/2));
    }
  });
  el.addEventListener('pointerup', e => {
    if (e.pointerId !== pointerId) return;
    pointerId = null;
    if (isDragging) { el.classList.remove('dragging'); isDragging = false; }
    else if (!moved) {
      if (selectedEl === el) deselect();
      else select(el);
    }
    moved = false;
  });
  el.addEventListener('pointercancel', () => {
    pointerId = null; isDragging = false; el.classList.remove('dragging');
  });
}

function select(el) {
  if (selectedEl && selectedEl !== el) deselect();
  selectedEl = el;
  el.classList.add('selected');
}
function deselect() {
  if (!selectedEl) return;
  selectedEl.classList.remove('selected');
  selectedEl = null;
}

document.getElementById('room-wrapper').addEventListener('pointerdown', e => {
  if (e.target.id === 'room-wrapper' || e.target.id === 'room-bg') deselect();
});

// Save room
document.getElementById('room-save-btn').addEventListener('click', saveRoom);
function saveRoom() {
  // 座標をroom-wrapperサイズで正規化（0〜1の比率）して保存
  // これにより画面サイズが変わっても正しく再現できる
  const _rw = document.getElementById('room-wrapper');
  const _rww = _rw.clientWidth || 1;
  const _rwh = _rw.clientHeight || 1;
  appState.placedItems = placedItems.map(item => ({
    id: item.id,
    fid: item.f.id,
    // 0〜1の正規化座標
    rx: (parseInt(item.el.style.left) + parseInt(item.el.style.width) / 2) / _rww,
    ry: (parseInt(item.el.style.top) + parseInt(item.el.style.height) / 2) / _rwh,
    sx: parseInt(item.el.style.width) / 1024,
    sy: parseInt(item.el.style.height) / 1024,
    flipped: item.flipped || false,
    rotation: item.rotation || 0
  }));
  saveUserData().then(async () => {
    if (appState.roomPublic) await savePublicRoom();
    showToast('💾 保存しました！');
  });
}

function loadRoomFromState() {
  if (!appState.placedItems || appState.placedItems.length === 0) return;
  const _lw = document.getElementById('room-wrapper');
  const _lww = _lw.clientWidth || 1;
  const _lwh = _lw.clientHeight || 1;
  appState.placedItems.forEach(saved => {
    const f = FURNITURE.find(f => f.id === saved.fid);
    if (!f) return;
    // 正規化座標→実際のpx座標に変換
    // rx/ryがあれば新形式、なければ旧形式（x/y）
    const px = saved.rx !== undefined ? saved.rx * _lww : (saved.x || 0);
    const py = saved.ry !== undefined ? saved.ry * _lwh : (saved.y || 0);
    createPlacedItem(f, px, py, { ...saved, x: px, y: py });
  });
}

// Clear room
document.getElementById('room-clear-btn').addEventListener('click', () => {
  if (!confirm('部屋をリセットしますか？')) return;
  placedItems.forEach(i => i.el.remove());
  placedItems = []; selectedEl = null;
  appState.placedItems = [];
  saveUserData();
  showToast('部屋をリセットしました');
});

// Public toggle
function updateRoomPublicBtn() {
  const btn = document.getElementById('room-public-btn');
  if (!btn) return;
  btn.textContent = appState.roomPublic ? '🌐 公開中' : '🔒 非公開';
}
document.getElementById('room-public-btn').addEventListener('click', async () => {
  appState.roomPublic = !appState.roomPublic;
  updateRoomPublicBtn();
  await saveUserData();
  await savePublicRoom();
  showToast(appState.roomPublic ? '🌐 部屋を公開しました！' : '🔒 非公開にしました');
});

// ========== PUBLIC ROOMS ==========
document.getElementById('refresh-rooms-btn').addEventListener('click', loadAndRenderPublicRooms);

async function loadAndRenderPublicRooms() {
  const list = document.getElementById('rooms-list');
  list.innerHTML = '<div class="empty-state"><span class="emoji">🔄</span>読み込み中…</div>';
  try {
    const rooms = await window.loadPublicRooms();
    if (!rooms || rooms.length === 0) {
      list.innerHTML = '<div class="empty-state"><span class="emoji">🏚</span>まだ公開されている部屋がありません</div>';
      return;
    }
    list.innerHTML = '';
    rooms.forEach(room => {
      const card = document.createElement('div');
      card.className = 'room-card';
      const info = document.createElement('div');
      info.className = 'room-card-info';
      const avatar = document.createElement('img');
      avatar.src = room.photoURL || '';
      avatar.alt = '';
      const textDiv = document.createElement('div');
      textDiv.innerHTML = `<div class="room-card-name">${escHtml(room.roomName || 'お部屋')}</div><div class="room-card-user">@${escHtml(room.displayName || '名無し')}</div>`;
      const arrow = document.createElement('div');
      arrow.className = 'room-card-arrow';
      arrow.textContent = '›';
      info.appendChild(avatar);
      info.appendChild(textDiv);
      info.appendChild(arrow);
      card.appendChild(info);
      card.addEventListener('click', () => openRoomViewer(room));
      list.appendChild(card);
    });
  } catch(e) {
    list.innerHTML = '<div class="empty-state"><span class="emoji">😢</span>読み込みに失敗しました</div>';
    console.error(e);
  }
}

// ========== ROOM VIEWER ==========
function openRoomViewer(room) {
  // マイルームを初期化
  if (!roomInited) {
    const roomScreen = document.getElementById('room-screen');
    roomScreen.style.display = 'flex';
    roomScreen.style.flexDirection = 'column';
    roomScreen.style.overflow = 'hidden';
    initRoomIfNeeded();
    // マイルームを非表示に戻す
    roomScreen.style.display = 'none';
  }

  // ヘッダーバーを表示
  const headerBar = document.getElementById('room-viewer-header-bar');
  document.getElementById('room-viewer-title').textContent = room.roomName || 'お部屋';
  document.getElementById('room-viewer-avatar').src = room.photoURL || '';
  headerBar.classList.add('show');

  // マイルーム画面に切り替え（ナビバーはそのまま残す）
  document.querySelectorAll('.screen').forEach(s => {
    s.classList.remove('active');
    s.style.display = 'none';
  });
  const roomScreen = document.getElementById('room-screen');
  roomScreen.style.display = 'flex';
  roomScreen.style.flexDirection = 'column';
  roomScreen.style.overflow = 'hidden';

  // ツールバーと操作ボタンを隠す
  document.getElementById('room-toolbar').style.display = 'none';
  document.querySelector('.room-actions').style.display = 'none';

  // room-wrapperのサイズが確定してからresizeRoom()を呼ぶ
  requestAnimationFrame(() => resizeRoom());

  // 自分の家具を非表示
  placedItems.forEach(i => { i.el.style.display = 'none'; });

  // 他人の家具をroom-wrapperに配置
  const wrapper = document.getElementById('room-wrapper');
  const tempItems = [];

  if (room.placedItems && room.placedItems.length > 0) {
    room.placedItems.forEach(saved => {
      const f = FURNITURE.find(f => f.id === saved.fid);
      if (!f) return;
      const el = document.createElement('div');
      el.className = 'placed-item viewer-temp';
      const w = Math.round(1024 * (saved.sx || f.scaleX));
      const h = Math.round(1024 * (saved.sy || f.scaleY));
      // 正規化座標→現在のroom-wrapperサイズでpx変換
      const vww = wrapper.clientWidth || 1;
      const vwh = wrapper.clientHeight || 1;
      const vx = saved.rx !== undefined ? saved.rx * vww : (saved.x || 0);
      const vy = saved.ry !== undefined ? saved.ry * vwh : (saved.y || 0);
      el.style.width  = w + 'px';
      el.style.height = h + 'px';
      el.style.left   = (vx - w / 2) + 'px';
      el.style.top    = (vy - h / 2) + 'px';
      el.style.zIndex = String(f.zBase + Math.floor(vy));
      el.style.pointerEvents = 'none';
      const img = document.createElement('img');
      img.src = 'images/' + f.file;
      img.style.cssText = 'width:100%;height:100%;object-fit:contain;display:block;';
      const rot = saved.rotation || 0;
      const flip = saved.flipped || false;
      if (flip || rot) {
        img.style.transform = flip
          ? (rot ? `scaleX(-1) rotate(${rot}deg)` : 'scaleX(-1)')
          : `rotate(${rot}deg)`;
      }
      el.appendChild(img);
      wrapper.appendChild(el);
      tempItems.push(el);
    });
  }

  window._viewerTempItems = tempItems;
}

document.getElementById('room-viewer-close').addEventListener('click', () => {
  // ヘッダーバーを非表示
  document.getElementById('room-viewer-header-bar').classList.remove('show');

  // 一時家具を削除
  if (window._viewerTempItems) {
    window._viewerTempItems.forEach(el => el.remove());
    window._viewerTempItems = [];
  }

  // 自分の家具を再表示
  placedItems.forEach(i => { i.el.style.display = ''; });

  // ツールバーと操作ボタンを戻す
  document.getElementById('room-toolbar').style.display = '';
  document.querySelector('.room-actions').style.display = '';

  // ツールバー・操作ボタンを戻す
  document.getElementById('room-toolbar').style.visibility = '';
  document.querySelector('.room-actions').style.visibility = '';

  // みんなのタブに戻る
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.querySelector('[data-screen="rooms"]').classList.add('active');
  document.querySelectorAll('.screen').forEach(s => {
    s.classList.remove('active');
    s.style.display = 'none';
  });
  const roomsScreen = document.getElementById('rooms-screen');
  roomsScreen.style.display = '';
  roomsScreen.classList.add('active');
});


// ========== STATS ==========
function renderStats() {
  const el = document.getElementById('stats-content');
  const todos = appState.todos || [];
  const history = appState.history || [];
  const total = appState.totalEarned || 0;
  const done = todos.filter(t => t.done).length;
  const notDone = todos.filter(t => !t.done).length;
  const inv = (appState.inventory || []).length;

  const levelCounts = {};
  history.forEach(h => { levelCounts[h.level] = (levelCounts[h.level]||0)+1; });

  let html = `
    <div class="stats-card">
      <h3>🪙 コイン情報</h3>
      <div class="stats-row"><span class="label">現在の所持コイン</span><span class="value gold">🪙 ${appState.coins}</span></div>
      <div class="stats-row"><span class="label">今日の残り獲得可能G</span><span class="value gold">🪙 ${getDailyRemaining()} / 270</span></div>
      <div class="stats-row"><span class="label">累計獲得コイン</span><span class="value gold">🪙 ${total}</span></div>
      <div class="stats-row"><span class="label">入手済み家具</span><span class="value">${inv} 種類</span></div>
    </div>
    <div class="stats-card">
      <h3>✅ やること統計</h3>
      <div class="stats-row"><span class="label">達成済み</span><span class="value">${done} 件</span></div>
      <div class="stats-row"><span class="label">未達成（残り）</span><span class="value">${notDone} 件</span></div>
      <div class="stats-row"><span class="label">できた！</span><span class="value">${levelCounts['できた！']||0} 回</span></div>
      <div class="stats-row"><span class="label">まぁまぁできた</span><span class="value">${levelCounts['まぁまぁできた']||0} 回</span></div>
      <div class="stats-row"><span class="label">少しできた</span><span class="value">${levelCounts['少しできた']||0} 回</span></div>
    </div>`;

  if (history.length > 0) {
    html += '<div class="stats-card"><h3>📋 達成履歴</h3>';
    history.slice(0, 20).forEach(h => {
      const d = new Date(h.date);
      const dateStr = `${d.getMonth()+1}/${d.getDate()} ${d.getHours()}:${String(d.getMinutes()).padStart(2,'0')}`;
      html += `<div class="todo-history-item">
        <div>
          <div class="hist-title">${escHtml(h.title)}</div>
          <div class="hist-level">${h.level} · ${dateStr}</div>
        </div>
        <div class="hist-earned">+🪙${h.earned}</div>
      </div>`;
    });
    html += '</div>';
  } else {
    html += '<div class="stats-card" style="text-align:center;color:#bbb;padding:2rem;">まだ達成履歴がありません</div>';
  }

  el.innerHTML = html;
}
